- name: Configuration du dépot DNF de SaltStack
  include_tasks: "{{ role_path }}/tasks/redhat/install/dnf-conf.yml"
- name: Installer le paquet salt-master
  ansible.builtin.dnf:
    name: salt-master-3008.0
    state: present
    update_cache: yes
  notify: Activer et démarrer le service salt-master

  